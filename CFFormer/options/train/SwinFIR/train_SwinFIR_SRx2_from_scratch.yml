# general settings
name: train_SwinFIR_SRx2_from_scratch
model_type: SwinFIRModel
scale: 2
num_gpu: 2
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: DF2K
    type: PairedImageDataset
    dataroot_gt: /tmp/pycharm_project_ATD/datasets/AID_train256
    dataroot_lq: /tmp/pycharm_project_ATD/datasets/AID_train128
#    meta_info_file: swinfir/data/meta_info/meta_info_DF2Ksub_GT.txt
    io_backend:
      type: disk

    gt_size: 120
    use_hflip: true
    use_rot: true
    use_mixup: true
    use_channelshuffle: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 10
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /tmp/pycharm_project_ATD/datasets/AID_val256
    dataroot_lq: /tmp/pycharm_project_ATD/datasets/AID_val128
    io_backend:
      type: disk

#  val_2:
#    name: Set14
#    type: PairedImageDataset
#    dataroot_gt: ./datasets/Set14/GTmod2
#    dataroot_lq: ./datasets/Set14/LRbicx2
#    io_backend:
#      type: disk


# network structures
network_g:
  type: SwinFIR
  upscale: 2
  in_chans: 3
  img_size: 60
  window_size: 12
  img_range: 1.
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 180
  num_heads: [6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: 'SFB'

# path
path:
  pretrain_network_g: /tmp/pycharm_project_ATD/SwinFIR_SRx2.pth
  param_key_g: params_ema
  strict_load_g: true
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [50000, 80000, 100000, 475000]
    gamma: 0.5

  total_iter: 500000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 2500
  save_img: false
  pbar: False

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 2
      test_y_channel: true
      better: higher  # the higher, the better. Default: higher
    ssim:
      type: calculate_ssim
      crop_border: 2
      test_y_channel: true
      better: higher  # the higher, the better. Default: higher

# logging settings
logger:
  print_freq: 200
  save_checkpoint_freq: !!float 2500
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
